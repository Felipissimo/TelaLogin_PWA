<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bem-vindo ao RepoPWA</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/10015/10015437.png" type="image/png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      overflow: hidden;
      color: white;
      text-align: center;
    }

    /* Efeito das esferas borradas de fundo igual ao seu login */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
    }

    body::before {
      background: #3b82f6;
      top: -100px;
      left: -100px;
    }

    body::after {
      background: #06b6d4;
      bottom: -120px;
      right: -120px;
    }

    .welcome-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      padding: 50px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    .icon-box {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .welcome-container h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(to right, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-container p {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .start-btn {
      display: inline-block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
    }

    .start-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="welcome-container">
    <div class="icon-box">📁</div>
    <h1>RepoPWA</h1>
    <p>Seu repositório online pessoal e portátil. Guarde seus códigos, anotações e projetos em um ambiente seguro, moderno e que funciona até mesmo offline.</p>
    
    <a href="index.html" class="start-btn">Acessar Meu Repositório</a>
  </div>

</body>
</html>
